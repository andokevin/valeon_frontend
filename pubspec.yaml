name: valeon
description: Valeon - Know what you see, hear, and watch
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '^3.10.8'

dependencies:
  flutter:
    sdk: flutter
  
  # ===== CORE =====
  provider: ^6.1.5+1
  connectivity_plus: ^6.1.3          # ⬆️ Mise à jour pour compatibilité
  path_provider: ^2.1.5
  path: ^1.9.1
  cupertino_icons: ^1.0.8
  
  # ===== BASE DE DONNÉES LOCALE (SQLite) =====
  sqflite: ^2.4.2                     # ⬆️ Mise à jour
  sqflite_common_ffi: ^2.3.4          # ⬆️ Mise à jour
  sqlite3_flutter_libs: ^0.5.27       # ⬆️ Mise à jour
  
  # ===== API & RÉSEAU =====
  http: ^1.3.0                        # ⬆️ Mise à jour
  dio: ^5.8.0+1                       # ⬆️ Mise à jour
  retrofit: ^4.4.2                     # ⬆️ Mise à jour
  logger: ^2.5.0                       # ⬆️ Mise à jour
  
  # ===== AUTHENTIFICATION =====
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.5
  sign_in_with_apple: ^7.0.1
  
  # ===== SÉCURITÉ =====
  flutter_secure_storage: ^9.2.4       # ⬆️ Mise à jour
  crypto: ^3.0.6                        # ⬆️ Mise à jour
  local_auth: ^2.3.0                    # ⬆️ Mise à jour
  
  # ===== UI / UX =====
  google_fonts: ^8.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1          # ⬆️ Mise à jour
  flutter_svg: ^2.0.16                  # ⬆️ Mise à jour
  lottie: ^3.3.1                        # ⬆️ Mise à jour
  animations: ^2.0.11                    # ⬆️ Mise à jour
  flutter_staggered_animations: ^1.1.0
  
  # ===== IMAGES & FICHIERS =====
  image_picker: ^1.1.2                  # ⬆️ Mise à jour
  file_picker: ^9.0.2                    # ⬆️ Mise à jour (MAJEURE)
  video_player: ^2.9.2                   # ⬆️ Mise à jour
  audio_waveforms: ^1.0.5                 # ⬆️ Mise à jour
  just_audio: ^0.9.45                     # ⬆️ Mise à jour
  
  # ===== UTILITAIRES =====
  intl: ^0.20.2                          # ⬆️ Mise à jour
  url_launcher: ^6.3.1                   # ⬆️ Mise à jour
  share_plus: ^10.1.4                    # ⬆️ Mise à jour (MAJEURE)
  package_info_plus: ^8.3.0              # ⬆️ Mise à jour (SOLUTION)
  device_info_plus: ^11.3.0              # ⬆️ Mise à jour
  permission_handler: ^11.4.0            # ⬆️ Mise à jour
  
  # ===== SYNC & BACKGROUND =====
  workmanager: ^0.5.2                    # ⬆️ Mise à jour
  flutter_local_notifications: ^18.0.1    # ⬆️ Mise à jour (MAJEURE)
  background_fetch: ^1.3.10               # ⬆️ Mise à jour

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15                  # ⬆️ Mise à jour
  retrofit_generator: ^9.1.9              # ⬆️ Mise à jour (MAJEURE)

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/