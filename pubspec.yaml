name: valeon
description: "Valeon - Know what you see, hear, and watch"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # ===== CORE =====
  provider: ^6.1.2
  connectivity_plus: ^6.1.3
  path_provider: ^2.1.5
  path: ^1.9.1
  cupertino_icons: ^1.0.8
  
  # ===== BASE DE DONNÉES LOCALE =====
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.5.27
  
  # ===== API & RÉSEAU =====
  http: ^1.3.0
  dio: ^5.8.0+1
  retrofit: ^4.4.2
  logger: ^2.5.0
  
  # ===== AUTHENTIFICATION =====
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^7.1.5
  sign_in_with_apple: ^7.0.1
  
  # ===== SÉCURITÉ =====
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  local_auth: ^2.3.0
  
  # ===== UI / UX =====
  google_fonts: ^8.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  lottie: ^3.3.1
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.0
  
  # ===== IMAGES & FICHIERS =====
  image_picker: ^1.1.2
  file_picker: ^9.0.2
  video_player: ^2.9.2
  audio_waveforms: ^1.0.5
  just_audio: ^0.9.45
  
  # ===== UTILITAIRES =====
  intl: ^0.20.2
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  package_info_plus: ^8.3.0
  device_info_plus: ^11.3.0
  permission_handler: ^11.4.0
  
  # ===== SYNC & BACKGROUND =====
  workmanager: ^0.6.0
  flutter_local_notifications: ^18.0.1
  background_fetch: ^1.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  retrofit_generator: ^9.1.9

   # ===== AUDIO RECORDING =====
  record: ^5.2.0 

flutter:
  uses-material-design: true