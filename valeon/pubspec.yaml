name: valeon
description: "Valeon - Know what you see, hear, and watch"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Permissions & Camera
  permission_handler: ^11.1.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # Audio Recording & Processing
  record: ^5.0.4
  audioplayers: ^5.2.1
  
  # Storage Local
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  
  # Social Share
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  
  # Video Player
  video_player: ^2.8.2
  
  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Assets (à créer plus tard)
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  # Fonts personnalisées (si nécessaire)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700